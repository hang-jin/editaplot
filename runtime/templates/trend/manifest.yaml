data_guide:
  headline_zh: 用连续 X 列展示时间、步骤、剂量或迭代过程中的一个或多个趋势。
  required_columns: [连续 X 列, 一个或多个数值系列]
  optional_columns: []
  accepted_layouts: [宽表]
  aliases: [Time/Step/Epoch/Dose, 时间/步数/剂量, 其余数值列作为系列]
  notes_zh:
    - 行顺序保持源文件顺序，不擅自平滑、补点或计算统计量。
    - 系列过多时会提示人工确认，画幅会随系列数自动扩展。
