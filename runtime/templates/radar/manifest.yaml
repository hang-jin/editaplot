data_guide:
  headline_zh: 比较多个对象在同一组指标上的相对轮廓。
  required_columns: [指标列, 至少两个非负数值系列]
  optional_columns: []
  accepted_layouts: [宽表；每行一个指标，每个数值列一个对象]
  aliases: [Metric/Indicator/Dimension, 指标/维度, 其余数值列作为对象]
  notes_zh:
    - 至少需要三个指标和两个对象；不接受负值。
    - 建议先把不同单位的指标规范化到可比较尺度，程序不会擅自归一化原数据。
