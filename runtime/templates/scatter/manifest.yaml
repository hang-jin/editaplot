requires_origin: true
runner: runner.py
schema: schema.json
example: example_standard.csv
outputs: [opju, png, pdf, tif]
status: implemented
visibility: public
workflow: scientific_table
service: service.py
ui_order: 80
family: general_relationship
examples:
  - id: basic
    name_zh: 基础双系列
    file: example_standard.csv
    description_zh: 少量观测点，用于快速理解 X + 多个 Y 的宽表格式。
  - id: dense
    name_zh: 密集散点自动适配
    file: example_dense.csv
