blank_template: data_template.csv
data_guide:
  headline_zh: 展示一个连续 X 与一个或多个连续观测系列之间的关系。
  required_columns: [一个数值 X 列, 一个或多个数值 Y 列]
  optional_columns: []
  accepted_layouts: [宽表]
  aliases: [X/Time/Concentration, 时间/浓度/自变量, Response/Signal/响应/信号]
  notes_zh:
    - 不自动拟合回归线、删除离群点或计算相关系数。
    - 点数增加时只调整显示密度，正式 Origin 仍使用全部数据。
