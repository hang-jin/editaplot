name: public release checks

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  windows-python-310:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10.11"
          cache: pip
          cache-dependency-path: |
            requirements-runtime.txt
            requirements-runtime.lock

      - name: Install audited runtime and test tools
        run: >-
          python -m pip install
          --constraint requirements-runtime.lock
          --requirement requirements-runtime.txt
          pytest==9.1.1
          ruff==0.14.11

      - name: Lint public control surface
        run: >-
          python -m ruff check --no-cache
          skill/editaplot/scripts
          tests
          tools/build_asset_provenance.py
          tools/build_palette_assets.py
          tools/build_runtime_manifest.py
          tools/build_showcase.py
          tools/generate_showcase_data.py
          tools/sync_public_gallery.py
          tools/verify_public_release.py

      - name: Run reproducible tests
        shell: pwsh
        run: >-
          python -m pytest
          -p no:cacheprovider
          --basetemp "$env:RUNNER_TEMP\editaplot-pytest"
          -ra

      - name: Enforce public-release allowlist
        run: python tools/verify_public_release.py
